name: Request Claude Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  request-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-haiku-4-5-20251001'
          prompt: |
            This PR was opened on the repository. Please provide a code review focusing on:
            - What changes were made and why
            - Any security issues, bugs, or problems
            - Code quality concerns and suggestions for improvement
            Keep the review concise and constructive.
          additional_permissions: |
            actions: read

