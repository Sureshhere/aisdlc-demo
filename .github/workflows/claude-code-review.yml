name: Request Claude Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  request-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Request Claude Review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment $PR_NUMBER -b "@claude Please review this pull request for:
          - What the changes do
          - Any bugs, security issues, or problems  
          - Code quality and suggestions for improvement
          Keep the review concise and constructive."

