name: Request Claude Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  request-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install anthropic

      - name: Get PR changes
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          head -200 pr.diff > pr_short.diff
          cat pr_short.diff

      - name: Review with Claude
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import anthropic
          import os
          
          with open('pr_short.diff', 'r') as f:
              diff = f.read()
          
          client = anthropic.Anthropic(api_key=os.getenv('ANTHROPIC_API_KEY'))
          message = client.messages.create(
              model="claude-haiku-4-5-20251001",
              max_tokens=800,
              messages=[{
                  "role": "user",
                  "content": f"Review this PR diff for security issues, bugs, and code quality:\n\n{diff}\n\nProvide a concise review."
              }]
          )
          
          review = message.content[0].text
          with open('review.txt', 'w') as f:
              f.write(review)
          print(review)
          PYTHON_SCRIPT

      - name: Post review
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🤖 Claude Code Review\n\n' + review
            });




